# CI — the loop nobody can skip. Mirrors the local gates deterministically:
# if it isn't green here, it isn't done, regardless of what any agent claims.
# Python/Docker stack (ADR-0001). The deterministic pytest suite uses a mock
# LLMProvider, so CI needs no live model endpoint.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Node is only for the deterministic check-* scripts (pure Node, no deps).

      # --- static / traceability (fast, no containers) ---
      - name: Traceability chain (and freshness of generated report)
        run: |
          node scripts/check-traceability.mjs --check-fresh
          node scripts/check-traceability.mjs ${{ (github.ref_name == 'main' || github.ref_name == 'master') && '--release' || '' }}
      - name: Trajectory process audit (and freshness)
        run: |
          node scripts/check-trajectory.mjs --check-fresh
          node scripts/check-trajectory.mjs ${{ (github.ref_name == 'main' || github.ref_name == 'master') && '--release' || '' }}
      - name: OpenSpec strict validation
        run: npx --yes openspec@1.5.0 validate --all --strict

      # --- the app: build the image and run the real battery in the container ---
      - name: Build app image
        run: docker compose build

      - name: Lint (ruff, in container)
        run: docker compose run --rm --no-deps app ruff check askdocs tests

      - name: Tests + coverage (pytest, in container; Qdrant service via compose)
        run: docker compose run --rm app pytest -q --cov=askdocs --cov-report=term-missing --cov-report=json:coverage/coverage-summary.json

      - name: Coverage ratchet
        run: node scripts/check-coverage-ratchet.mjs

      # --- eval quality bar (once evals exist; graceful no-op before then) ---
      - name: Eval ratchet
        run: node scripts/check-eval-ratchet.mjs

      - name: Compose down
        if: always()
        run: docker compose down -v

      # --- evidence ---
      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-evidence
          path: |
            docs/qa/traceability-report.md
            trace/trace.json
            coverage/coverage-summary.json
          if-no-files-found: ignore
